name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"
      
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel
      
      - name: Build distribution
        run: |
          python -m build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: distribution
          path: dist/
  
  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: release
    
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: distribution
          path: dist/
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
  
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v3
        with:
          name: distribution
          path: dist/
      
      - name: Get version from tag
        id: tag_name
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Generate changelog
        id: changelog
        run: |
          # Extract changelog for this version from CHANGELOG.md or git log
          echo "CHANGELOG=$(git log --oneline $(git describe --tags --abbrev=0 HEAD^)..HEAD | head -20)" >> $GITHUB_OUTPUT
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_name.outputs.VERSION }}
          name: Release ${{ steps.tag_name.outputs.VERSION }}
          body: |
            # LOHI-TRADE ${{ steps.tag_name.outputs.VERSION }}
            
            ## Installation
            
            ```bash
            pip install lohi-trade==${{ steps.tag_name.outputs.VERSION }}
            ```
            
            ## Changes
            
            See [CHANGELOG.md](CHANGELOG.md) for detailed changes.
            
            ## Testing
            
            This release has been tested on:
            - Python 3.11, 3.12, 3.13
            - macOS, Ubuntu, Windows
            - 1474+ unit tests passing
            
            ## Docker
            
            ```bash
            docker pull lohi-trade:${{ steps.tag_name.outputs.VERSION }}
            ```
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
